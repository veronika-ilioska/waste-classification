dataset:
  # Download TACO with the upstream repo first, then point this at the folder
  # containing annotations.json and the batch_* image directories.
  dir: datasets/TACO/data
  annotation_file: annotations.json
  image_extensions:
    - .jpg
    - .jpeg
    - .png
  taxonomy: taco10
  category_field: supercategory

output:
  dir: artifacts/taco/maskrcnn_taco10

model:
  pretrained: true
  weights: DEFAULT

training:
  batch_size: 2
  epochs: 100
  learning_rate: 0.001
  momentum: 0.9
  weight_decay: 0.0005
  workers: 0
  seed: 42
  val_fraction: 0.15
  test_fraction: 0.15
  patience: 5
  device: auto

augmentation:
  horizontal_flip_probability: 0.5
  rotation_degrees: 15
  object_crop_probability: 0.35
  object_crop_scale:
    - 0.65
    - 1.0
  brightness: 0.2
  contrast: 0.2
  saturation: 0.15
  hue: 0.03
  blur_probability: 0.15
  blur_kernel_size: 5
  noise_probability: 0.2
  noise_std: 0.03

evaluation:
  score_threshold: 0.001
