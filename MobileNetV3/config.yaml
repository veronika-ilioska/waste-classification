dataset:
  handle: ahsan71/ecodetect-recyclable-waste-detection-dataset
  dir:
  image_extensions:
    - .bmp
    - .gif
    - .jpeg
    - .jpg
    - .png

output:
  dir: artifacts/ecodetect/mobilenetv3

model:
  name: mobilenetv3small
  image_width: 224
  image_height: 224
  use_imagenet_weights: true
  dropout_rate: 0.25

training:
  batch_size: 32
  epochs: 10
  fine_tune_epochs: 5
  fine_tune_layers: 30
  learning_rate: 0.001
  fine_tune_learning_rate: 0.00001
  seed: 42

augmentation:
  random_rotation: 0.08
  random_zoom: 0.1
  random_contrast: 0.1

callbacks:
  early_stopping_patience: 3
  lr_reduction_factor: 0.2
  lr_reduction_patience: 2
  min_learning_rate: 0.0000001

evaluation:
  misclassified_examples: 25
